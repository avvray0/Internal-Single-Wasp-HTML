  <body>
    <link rel="stylesheet" href="../style.css" />
    <div>
      <link href="./contact-form51.css" rel="stylesheet" />
      <div class="contact-form51-contact1 thq-section-padding contact-form51">
        <div class="thq-section-max-width thq-flex-column">
          <div class="contact-form51-section-title thq-flex-column">
            <div class="contact-form51-content">
              <span class="thq-body-small contact-form51-text10">
                <fragment class="contact-form51-fragment1">
                  <span class="contact-form51-text18">
                    Lorem ipsum dolor sit amet, consectetur adipiscing elit.
                  </span>
                </fragment>
              </span>
            </div>
          </div>
          <form
            action="https://formsubmit.co/fe157263a25cd09f33f9bd61a96a9957"
            method="POST"
            enctype="text/plain"
            class="contact-form51-form thq-flex-column"
          >
            <div class="contact-form51-container1">
              <div class="contact-form51-input1">
                <label
                  for="contact-form-5-first-name"
                  class="contact-form51-text11 thq-body-small"
                >
                  Full Name
                </label>
                <input
                  type="text"
                  name=”text”
                  id="contact-form-5-first-name"
                  required="true"
                  placeholder="Full Name"
                  class="contact-form51-text-input1 thq-input"
                />
              </div>
              <div class="contact-form51-input2">
                <label
                  for="contact-form-5-last-name"
                  class="contact-form51-text12 thq-body-small"
                >
                  Address
                </label>
                <input
                  type="text"
                  name=”text”
                  id="contact-form-5-last-name"
                  required="true"
                  placeholder="Address"
                  class="contact-form51-text-input2 thq-input"
                />
              </div>
            </div>
            <div class="contact-form51-container2">
              <div class="contact-form51-input3">
                <label
                  for="contact-form-5-email"
                  class="contact-form51-text13 thq-body-small"
                >
                  Email
                </label>
                <input
                  type="email"
                  name=”email”
                  id="contact-form-5-email"
                  required="true"
                  placeholder="Email"
                  class="contact-form51-text-input3 thq-input"
                />
              </div>
              <div class="contact-form51-input4">
                <label
                  for="contact-form-5-phone"
                  class="contact-form51-text14 thq-body-small"
                >
                  Phone Number
                </label>
                <input
                  type="tel"
                  name=”tel”
                  id="contact-form-5-phone"
                  required="true"
                  placeholder="Phone Number"
                  class="contact-form51-text-input4 thq-input"
                />
              </div>
            </div>
            <div class="contact-form51-container3">
              <div class="contact-form51-input5">
                <label
                  for="contact-form-5-options"
                  class="contact-form51-text15 thq-body-small"
                >
                  Preferred Means Of Communication
                </label>
                <select
                  id="contact-form-5-options"
                  type=”select”
                  name=”select”
                  placeholder="Select one"
                  class="contact-form51-select thq-select"
                >
                  <option value="Option 1">Text</option>
                  <option value="Option 2">Email</option>
                  <option value="Option 3">Phone Call</option>
                </select>
              </div>
            </div>
            <div class="contact-form51-container4">
              <label
                for="contact-form-5-message"
                class="contact-form51-text16 thq-body-small"
              >
                Inquired Service &amp; Further Details
              </label>
              <textarea
                type=”service”
                name=”service”
                id="contact-form-5-message"
                rows="3"
                placeholder="Enter the service your are Inquiring about"
                class="contact-form51-textarea thq-input"
              ></textarea>
            </div>
            <div class="contact-form51-checkbox1">
              <input
                type="checkbox"
                id="contact-form-5-check"
                checked="true"
                required="true"
                class="thq-checkbox"
              />
              <label
                for="contact-form-5-check"
                class="contact-form51-text17 thq-body-small"
              >
                By providing your phone number, you consent to begin receiving
                text messages from Vega Lawn Care Services.
              </label>
            </div>
            <button
              type="submit"
              name=”submit”
              class="contact-form51-button thq-button-filled"
            >
              <span class="thq-body-small">
                <fragment class="contact-form51-fragment2">
                  <span class="contact-form51-text19">
                    <span class="contact-form51-text20">SUBMIT REQUEST</span>
                    <br />
                  </span>
                </fragment>
              </span>
            </button>
          </form>
        </div>
      </div>
    </div>
    <script
      defer=""
      src="https://unpkg.com/@teleporthq/teleport-custom-scripts"
    ></script>
  </body>
