  <body>
    <link rel="stylesheet" href="../style.css" />
    <div>
      <link href="./component.css" rel="stylesheet" />
      <div class="component-container1">
        <form
          action="https://formsubmit.co/vegalawncare@outlook.com"
          method="POST"
          class="component-form"
        >
          <label for="name" class="component-text10">
            <fragment class="component-fragment2">
              <span class="component-text20">Full Name:</span>
            </fragment>
          </label>
          <input
            type="text"
            id="name"
            name="name"
            required="true"
            placeholder="Full Name"
            class="component-textinput1 input"
          />
          <label for="email" class="component-text11">
            <fragment class="component-fragment6">
              <span class="component-text24">Email Address:</span>
            </fragment>
          </label>
          <input
            type="email"
            id="email"
            name="email"
            required="true"
            placeholder="Email"
            class="component-textinput2 input"
          />
          <label for="phone" class="component-text12">
            <fragment class="component-fragment3">
              <span class="component-text21">Phone Number:</span>
            </fragment>
          </label>
          <input
            type="tel"
            id="phone"
            name="phone"
            required="true"
            placeholder="Phone Number"
            class="component-textinput3 input"
          />
          <label for="communication" class="component-text13">
            <fragment class="component-fragment9">
              <span class="component-text27">
                Preferred Method of Communication:
              </span>
            </fragment>
          </label>
          <div>
            <input
              type="radio"
              id="text"
              name="communication"
              value="Text"
              required=""
              class="input"
            />
            <label for="text" class="component-text14">
              <fragment class="component-fragment7">
                <span class="component-text25">Text</span>
              </fragment>
            </label>
          </div>
          <div>
            <input
              type="radio"
              id="email"
              name="communication"
              value="Email"
              required=""
              class="input"
            />
            <label for="email" class="component-text15">
              <fragment class="component-fragment1">
                <span class="component-text19">Email</span>
              </fragment>
            </label>
          </div>
          <div>
            <input
              type="radio"
              id="phone"
              name="communication"
              value="Phone"
              required=""
              class="input"
            />
            <label for="phone" class="component-text16">
              <fragment class="component-fragment4">
                <span class="component-text22">Phone</span>
              </fragment>
            </label>
          </div>
          <label for="message" class="component-text17">
            <fragment class="component-fragment5">
              <span class="component-text23">Inquired Service:</span>
            </fragment>
          </label>
          <textarea
            id="message"
            cols="50"
            name="message"
            rows="4"
            placeholder="Service"
            class="component-textarea textarea"
          ></textarea>
          <button type="submit" class="component-button button">
            <span>
              <fragment class="component-fragment8">
                <span class="component-text26">SUBMIT REQUEST</span>
              </fragment>
            </span>
          </button>
        </form>
      </div>
    </div>
    <script
      defer=""
      src="https://unpkg.com/@teleporthq/teleport-custom-scripts"
    ></script>
  </body>
</html>
